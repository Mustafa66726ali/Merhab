name: merhab

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-merhab}
      POSTGRES_USER: ${DB_USER:-merhab}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-merhab} -d ${DB_NAME:-merhab}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    environment:
      BACKEND_ORIGIN: http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/staticfiles:ro
    depends_on:
      - backend
      - frontend

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    entrypoint: []
    command: ["sh", "./reminder-scheduler.sh"]
    depends_on:
      backend:
        condition: service_started

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
    entrypoint: []
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency=2"]
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  # بوت واتساب للاختبار فقط — لا يُستخدم في الإنتاج (Twilio بدلاً منه)
  whatsapp-bot:
    profiles: ["dev-bot"]
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${WHATSAPP_BOT_TOKEN:-merhab-bot-dev}
      BACKEND_URL: ${WHATSAPP_BOT_BACKEND_URL:-http://backend:8000}
      PORT: "8088"
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth
    ports:
      - "8088:8088"

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  wwebjs_auth:
